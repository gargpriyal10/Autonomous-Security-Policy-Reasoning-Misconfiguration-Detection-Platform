<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
        }

        input {
            margin-bottom: 15px;
        }
    </style>

</head>

<body>

    <div class="card">

        <h3 class="text-center mb-4">Security Platform Login</h3>
        
        {% if error %}
        <script>
        alert("{{ error }}");
        </script>
        {% endif %}

        <form method="POST">

            <input class="form-control" name="username" placeholder="Username">

            <input class="form-control" name="password" type="password" placeholder="Password">

            <button class="btn btn-primary w-100">Login</button>

        </form>

        <p class="text-center mt-3">

            <a href="/register" style="color:#60a5fa">Create Account</a>

        </p>

    </div>

</body>

</html>
