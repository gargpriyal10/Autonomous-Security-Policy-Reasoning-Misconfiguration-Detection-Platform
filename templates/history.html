<!DOCTYPE html>
<html>

<head>

<title>Scan History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:40px;
}

table{
background:#1e293b;
}

</style>

</head>

<body>

<h2>Security Scan History</h2>

<a href="/" class="btn btn-primary mb-3">Back to Dashboard</a>

<table class="table table-dark table-striped">

<thead>
<tr>
<th>Risk Score</th>
<th>Risk Level</th>
<th>Issues</th>
<th>Time</th>
</tr>
</thead>

<tbody>

{% for scan in scans %}

<tr>
<td>{{ scan[0] }}</td>
<td>{{ scan[1] }}</td>
<td>{{ scan[2] }}</td>
<td>{{ scan[3] }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</body>

</html>
