<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <title>Attack Graph</title>

    <!-- VIS NETWORK -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"></script>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            font-family: Arial;
            color: white;
            padding: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        #mynetwork {
            width: 100%;
            height: 500px;
            background-color: #111827;
            border-radius: 10px;
            border: 1px solid #374151;
        }

        .card {
            background: #1e293b;
            border: none;
            border-radius: 12px;
            padding: 20px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Cloud Attack Path Graph</h2>

        <div class="card">
            <div id="mynetwork"></div>
        </div>

    </div>

    <script>

        function drawGraph() {

            const container = document.getElementById("mynetwork");

            // NODES
            const nodes = new vis.DataSet([
                { id: "Internet", label: "Internet User", color: "#ef4444", size: 25 },
                { id: "IAM", label: "IAM Role", color: "#3b82f6", size: 25 },
                { id: "Privilege", label: "Privilege Escalation", color: "#f97316", size: 25 },
                { id: "EC2", label: "EC2 Instance", color: "#10b981", size: 25 },
                { id: "S3", label: "S3 Bucket", color: "#10b981", size: 25 },
                { id: "Data", label: "Sensitive Data", color: "#ef4444", size: 25 }
            ]);

            // EDGES (connections)
            const edges = new vis.DataSet([
                { from: "Internet", to: "IAM", arrows: "to" },
                { from: "IAM", to: "Privilege", arrows: "to" },
                { from: "Privilege", to: "EC2", arrows: "to" },
                { from: "Privilege", to: "S3", arrows: "to" },
                { from: "S3", to: "Data", arrows: "to" }
            ]);

            const data = {
                nodes: nodes,
                edges: edges
            };

            const options = {

                nodes: {
                    shape: "dot",
                    font: {
                        color: "white",
                        size: 14
                    }
                },

                edges: {
                    width: 2,
                    smooth: true
                },

                interaction: {
                    hover: true,
                    dragNodes: true
                },

                physics: {
                    enabled: true,
                    solver: "repulsion",
                    repulsion: {
                        nodeDistance: 200
                    }
                }
            };

            new vis.Network(container, data, options);
        }

        drawGraph();

    </script>

</body>

</html>
